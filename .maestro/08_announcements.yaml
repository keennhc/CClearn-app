appId: host.exp.Exponent
name: Announcements Screen
---
# Navigate to Announcements tab
- tapOn: "Announcements"

# Wait for screen to load
- extendedWaitUntil:
    visible: "No Announcements|No Community Selected|.*Announcement.*"
    timeout: 10000

# If no community selected, just verify empty state renders
- runFlow:
    when:
      visible: "No Community Selected"
    commands:
      - assertVisible: "Select a community from the Home tab to view announcements"
