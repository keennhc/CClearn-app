appId: host.exp.Exponent
name: Join Community Flow
---
# Assumes user is logged in and on Home screen
- assertVisible: "My Communities"

# Tap FAB to add community
- tapOn:
    point: "90%,90%"

# Should see join/create screen
- assertVisible:
    text: "Join Existing"
    timeout: 5000

# Enter a community code
- tapOn: "Community Code"
- inputText: "${JOIN_CODE}"

# Tap join
- tapOn: "Join Community"

# Should navigate to community detail or show error
- extendedWaitUntil:
    visible: "Quick Actions|Failed to join|Invalid"
    timeout: 10000
