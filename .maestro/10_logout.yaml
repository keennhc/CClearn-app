appId: host.exp.Exponent
name: Logout Flow
---
# Navigate to Profile tab
- tapOn: "Profile"

# Tap sign out
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000
- tapOn: "Sign Out"

# Should return to login screen
- extendedWaitUntil:
    visible: "Home Owners Hub"
    timeout: 10000
- assertVisible: "Sign in to your account"
