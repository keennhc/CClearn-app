appId: host.exp.Exponent
name: Full E2E Flow - Login, Browse, Chat, Logout
---
# === LOGIN ===
- assertVisible: "Home Owners Hub"
- tapOn: "Email"
- inputText: "${EMAIL}"
- tapOn: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"

# Wait for home screen
- extendedWaitUntil:
    visible: "My Communities"
    timeout: 15000

# === HOME - TAP COMMUNITY ===
- tapOn:
    text: "members"
    index: 0

# === COMMUNITY DETAIL ===
- extendedWaitUntil:
    visible: "Quick Actions"
    timeout: 10000
- assertVisible: "Open Chat"

# === CHAT ===
- tapOn: "Open Chat"

# === ANNOUNCEMENTS ===
- tapOn: "Announcements"

# === PROFILE ===
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000

# === LOGOUT ===
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible: "Home Owners Hub"
    timeout: 10000
