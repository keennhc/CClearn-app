appId: host.exp.Exponent
name: Community Detail Screen
---
# Assumes user navigated to a community detail
- extendedWaitUntil:
    visible: "Quick Actions"
    timeout: 10000

# Verify action buttons are present
- assertVisible: "Open Chat"
- assertVisible: "Announcements"

# Verify statistics section loads
- assertVisible: "Statistics"

# Navigate to Chat via quick action
- tapOn: "Open Chat"
