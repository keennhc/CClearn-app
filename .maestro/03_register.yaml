appId: host.exp.Exponent
name: Registration Flow
env:
  FIRST_NAME: "Test"
  LAST_NAME: "User"
  REG_EMAIL: "newuser@example.com"
  REG_PASSWORD: "password123"
---
# Navigate to register screen
- assertVisible: "Home Owners Hub"
- tapOn: "Don't have an account? Register"

# Verify register screen renders
- assertVisible: "Create Account"
- assertVisible: "Join Home Owners Hub"

# Fill in registration form
- tapOn: "First Name"
- inputText: "${FIRST_NAME}"
- tapOn: "Last Name"
- inputText: "${LAST_NAME}"
- tapOn: "Email"
- inputText: "${REG_EMAIL}"
- tapOn: "Password"
- inputText: "${REG_PASSWORD}"

# Submit registration
- tapOn:
    text: "Create Account"
    index: 1

# Dismiss iOS save password prompt
- tapOn: "Not Now"

# Should navigate to Community Setup (new user has no communities)
- extendedWaitUntil:
    visible: "Get Started"
    timeout: 15000
