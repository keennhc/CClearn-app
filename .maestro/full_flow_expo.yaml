appId: host.exp.Exponent
name: Full E2E Flow (Expo already running) - Signup, Login, Browse, Chat, Logout
env:
  FIRST_NAME: "E2E"
  LAST_NAME: "Tester"
  PASSWORD: "Test1234"
---
# Restart app (no clearKeychain — avoids Expo dev tools modal)
- stopApp:
    appId: host.exp.Exponent
- launchApp:
    appId: host.exp.Exponent
    permissions:
      all: allow
- openLink: "exp://127.0.0.1:8081"

# If a stale session left us on Get Started, sign out
- runFlow:
    when:
      visible: "Get Started"
    file: _sign_out_setup.yaml

# If a stale session left us on My Communities, sign out
- runFlow:
    when:
      visible: "My Communities"
    file: _sign_out_home.yaml

# Generate a unique email and community name for this run
- evalScript: ${output.email = 'e2e_' + Date.now() + '@test.com'}
- evalScript: ${output.communityName = 'E2E Community ' + Date.now()}

# === REGISTER ===
- extendedWaitUntil:
    visible: "Sign in to your account"
    timeout: 15000
- tapOn: "Don't have an account? Register"

- extendedWaitUntil:
    visible: "Create Account"
    timeout: 5000

- tapOn: "First Name"
- inputText: "${FIRST_NAME}"
- tapOn: "Last Name"
- inputText: "${LAST_NAME}"
- tapOn: "Email"
- inputText: "${output.email}"
- tapOn: "Password"
- inputText: "${PASSWORD}"

- tapOn:
    text: "Create Account"
    index: 1

# Dismiss iOS save password prompt
- tapOn: "Not Now"

# === COMMUNITY SETUP (new user has no communities) ===
- extendedWaitUntil:
    visible: "Get Started"
    timeout: 15000

- tapOn: "Create"

- tapOn: "Community Name"
- inputText: "${output.communityName}"
- tapOn: "Description (optional)"
- inputText: "Auto-created by E2E test"

- tapOn: "Create Community"

# === HOME (after signup) ===
- extendedWaitUntil:
    visible: "My Communities"
    timeout: 15000

# === LOGOUT (to test login with the new account) ===
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible: "Home Owners Hub"
    timeout: 10000

# === LOGIN (with the account we just created) ===
- tapOn: "Email"
- inputText: "${output.email}"
- tapOn: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"

# Dismiss iOS save password prompt
- tapOn: "Not Now"

# Wait for home screen
- extendedWaitUntil:
    visible: "My Communities"
    timeout: 15000

# === HOME - TAP COMMUNITY ===
- tapOn: "E2E Community.*"

# === COMMUNITY DETAIL ===
- extendedWaitUntil:
    visible: "Quick Actions"
    timeout: 10000
- assertVisible: "Open Chat"

# === CHAT ===
- tapOn: "Open Chat"

# === ANNOUNCEMENTS ===
- tapOn: "Announcements"
- extendedWaitUntil:
    visible: "No Announcements"
    timeout: 10000

# === PROFILE ===
- tapOn:
    point: "87%,96%"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000

# === LOGOUT ===
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible: "Home Owners Hub"
    timeout: 10000
