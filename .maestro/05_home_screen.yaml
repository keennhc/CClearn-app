appId: host.exp.Exponent
name: Home Screen - Community List
---
# Assumes user is logged in and on Home screen
- extendedWaitUntil:
    visible: "My Communities"
    timeout: 10000

# Tap on a community to view details
- tapOn:
    text: "members"
    index: 0

# Should see community detail screen
- extendedWaitUntil:
    visible: "Quick Actions"
    timeout: 10000
