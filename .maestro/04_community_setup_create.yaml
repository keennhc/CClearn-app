appId: host.exp.Exponent
name: Create Community from Setup Screen
---
# Assumes user is on Community Setup screen after registration
- assertVisible: "Get Started"

# Switch to Create tab
- tapOn: "Create"

# Fill in community details
- tapOn: "Community Name"
- inputText: "Test Community"
- tapOn: "Description"
- inputText: "A community created during E2E testing"

# Create the community
- tapOn: "Create Community"

# Should navigate to Home with the new community visible
- extendedWaitUntil:
    visible: "My Communities"
    timeout: 15000
- assertVisible: "Test Community"
