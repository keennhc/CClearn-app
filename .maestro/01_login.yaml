appId: host.exp.Exponent
name: Login Flow
env:
  EMAIL: "test@example.com"
  PASSWORD: "password123"
---
# Verify login screen renders
- assertVisible: "Home Owners Hub"
- assertVisible: "Sign in to your account"

# Submit with empty fields shows validation error
- tapOn: "Sign In"
- assertVisible: "Please fill in all fields"

# Enter valid credentials and log in
- tapOn: "Email"
- inputText: "${EMAIL}"
- tapOn: "Password"
- inputText: "${PASSWORD}"
- tapOn: "Sign In"

# Dismiss iOS save password prompt
- tapOn: "Not Now"

# Should navigate to Home or Community Setup
- extendedWaitUntil:
    visible: "My Communities"
    timeout: 15000
